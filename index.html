<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>KATAHA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&display=swap');
        
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Syncopate', sans-serif;
            margin: 0;
            padding: 15px;
            overflow-x: hidden;
        }

        /* Убираем скроллбар */
        ::-webkit-scrollbar { width: 0; }

        /* Карточка фильма */
        .movie-card {
            background: #000;
            border: 1px solid #1a1a1a;
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .movie-card.show {
            opacity: 1;
            transform: translateY(0);
        }

        .movie-card:active {
            transform: scale(0.97);
            border-color: #555;
        }

        /* Обложка (Черно-белая по умолчанию) */
        .movie-poster {
            width: 100%;
            height: 250px;
            object-fit: cover;
            filter: grayscale(100%) contrast(1.1);
            transition: 0.5s;
        }

        .movie-card:hover .movie-poster {
            filter: grayscale(0%);
        }

        /* Рейтинг */
        .rating-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #333;
            padding: 2px 6px;
            font-size: 10px;
            color: #fff;
        }

        .movie-info {
            padding: 10px;
            border-top: 1px solid #1a1a1a;
        }

        .movie-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Анимация загрузки */
        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            z-index: 100;
        }
        .scanline {
            width: 40px;
            height: 2px;
            background: #fff;
            animation: scan 1.5s infinite;
        }
        @keyframes scan {
            0% { transform: scaleX(0); opacity: 0; }
            50% { transform: scaleX(1); opacity: 1; }
            100% { transform: scaleX(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="loader"><div class="scanline"></div></div>

    <div id="grid" class="grid grid-cols-2 gap-4 pt-4"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = '#000000';
        tg.backgroundColor = '#000000';

        async function init() {
            try {
                const res = await fetch('/movies');
                const movies = await res.json();
                const container = document.getElementById('grid');
                document.getElementById('loader').style.display = 'none';

                movies.forEach((m, i) => {
                    const rating = m.count > 0 ? (m.sum_rating / m.count).toFixed(1) : "0.0";
                    // Генерация обложки по file_id для уникальности
                    const poster = `https://picsum.photos/seed/${m.file_id}/300/450`;

                    const el = document.createElement('div');
                    el.className = 'movie-card';
                    el.innerHTML = `
                        <div class="rating-badge">★ ${rating}</div>
                        <img src="${poster}" class="movie-poster" alt="poster" loading="lazy">
                        <div class="movie-info">
                            <div class="movie-title">${m.name}</div>
                        </div>
                    `;
                    
                    el.onclick = () => select(m.name, m.file_id);
                    container.appendChild(el);
                    
                    // Плавное появление
                    setTimeout(() => el.classList.add('show'), i * 80);
                });
            } catch (err) {
                console.error("Fetch error:", err);
            }
        }

        async function select(name, fid) {
            tg.HapticFeedback.impactOccurred('medium');
            await fetch('/select_movie', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    user_id: tg.initDataUnsafe.user?.id,
                    movie_name: name,
                    file_id: fid
                })
            });
            tg.close();
        }

        init();
    </script>
</body>
</html>
