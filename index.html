<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; }
        #loader { text-align: center; margin-top: 50px; color: #ff0000; font-weight: bold; }
        .movie-card { background: #1a1a1a; border: 1px solid #333; padding: 15px; margin-bottom: 10px; border-radius: 10px; text-align: center; }
        .movie-card:active { background: #333; }
    </style>
</head>
<body>
    <div id="loader">ЗАГРУЗКА СПИСКА...</div>
    <div id="grid"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        async function loadMovies() {
            const loader = document.getElementById('loader');
            const grid = document.getElementById('grid');
            
            try {
                const response = await fetch('/movies');
                const data = await response.json();

                if (data.error) {
                    loader.innerText = "Ошибка: " + data.error;
                    return;
                }

                loader.style.display = 'none';
                grid.innerHTML = ''; // Очищаем

                data.forEach(movie => {
                    const div = document.createElement('div');
                    div.className = 'movie-card';
                    div.innerHTML = `<strong>${movie.name}</strong>`;
                    div.onclick = () => sendMovie(movie.name, movie.file_id);
                    grid.appendChild(div);
                });
            } catch (e) {
                loader.innerText = "Сервер недоступен";
            }
        }

        async function sendMovie(name, fileId) {
            const userId = tg.initDataUnsafe?.user?.id;
            if (!userId) return alert("Ошибка Telegram ID");

            await fetch('/select_movie', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId, movie_name: name, file_id: fileId })
            });
            tg.close();
        }

        loadMovies();
    </script>
</body>
</html>
