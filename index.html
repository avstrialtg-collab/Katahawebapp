<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; }
        #loader { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: red; }
        .movie-card { border: 1px solid #333; padding: 10px; margin: 10px; cursor: pointer; border-radius: 8px; }
        #grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
    </style>
</head>
<body>
    <div id="loader">ЗАГРУЗКА...</div>
    <div id="grid"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); // Сообщаем Telegram, что приложение загружено
        tg.expand(); // Разворачиваем на весь экран

        const user_id = tg.initDataUnsafe?.user?.id || 0;

        async function loadMovies() {
            const loader = document.getElementById('loader');
            const grid = document.getElementById('grid');

            try {
                const response = await fetch('/movies');
                const data = await response.json();

                if (data.error) {
                    loader.innerText = "Ошибка БД: " + data.error;
                    return;
                }

                if (data.length === 0) {
                    loader.innerText = "Список фильмов пуст";
                    return;
                }

                data.forEach(movie => {
                    const card = document.createElement('div');
                    card.className = 'movie-card';
                    card.innerHTML = `<strong>${movie.name}</strong>`;
                    card.onclick = () => selectMovie(movie.name, movie.file_id);
                    grid.appendChild(card);
                });

                loader.style.display = 'none'; // Прячем загрузку при успехе

            } catch (e) {
                console.error(e);
                loader.innerText = "Ошибка связи с сервером";
            }
        }

        async function selectMovie(name, fileId) {
            if (!user_id) {
                alert("Ошибка: ID пользователя не найден");
                return;
            }

            try {
                const res = await fetch('/select_movie', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: user_id,
                        movie_name: name,
                        file_id: fileId
                    })
                });
                
                if (res.ok) {
                    tg.close(); // Закрываем WebApp после выбора
                } else {
                    alert("Ошибка при отправке фильма");
                }
            } catch (e) {
                alert("Ошибка сети");
            }
        }

        loadMovies();
    </script>
</body>
</html>
