<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KATAHA WebApp</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f0f0f; color: white; font-family: sans-serif; }
        .movie-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }
        .movie-card:hover { border-color: #ef4444; }
    </style>
</head>
<body class="p-4">
    <header class="text-center mb-6">
        <h1 class="text-3xl font-bold text-red-600">KATAHA</h1>
        <p class="text-gray-400 text-sm">ВЫБЕРИ СВОЙ ФИЛЬМ</p>
    </header>

    <div id="loader" class="flex justify-center items-center h-64">
        <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-red-600"></div>
    </div>

    <div id="movie-grid" class="grid grid-cols-1 gap-4"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const API_URL = "https://katahawebapp.onrender.com";

        async function loadMovies() {
            try {
                const response = await fetch(`${API_URL}/movies`);
                const movies = await response.json();
                const grid = document.getElementById('movie-grid');
                const loader = document.getElementById('loader');
                
                loader.style.display = 'none';
                
                if (!movies || movies.length === 0) {
                    grid.innerHTML = '<p class="text-center text-gray-500">Список пуст</p>';
                    return;
                }
                
                movies.forEach(movie => {
                    const card = document.createElement('div');
                    card.className = 'movie-card p-4 rounded-xl flex justify-between items-center';
                    card.innerHTML = `
                        <div>
                            <h3 class="font-bold uppercase">${movie.name}</h3>
                            <span class="text-xs text-red-500 font-bold text-gray-400">★ NEW</span>
                        </div>
                        <button onclick="watchMovie('${movie.name}', '${movie.file_id}')" 
                                class="bg-red-600 px-4 py-2 rounded-lg font-bold text-sm">
                            СМОТРЕТЬ
                        </button>
                    `;
                    grid.appendChild(card);
                });
            } catch (e) {
                document.getElementById('loader').innerHTML = '<p class="text-red-500">Ошибка сервера</p>';
            }
        }

        async function watchMovie(name, fileId) {
            const userId = tg.initDataUnsafe.user?.id;
            if (!userId) return alert("Запустите через Telegram");

            try {
                await fetch(`${API_URL}/select_movie`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        user_id: userId,
                        movie_name: name,
                        file_id: fileId
                    })
                });
                tg.close();
            } catch (e) {
                alert("Ошибка связи с ботом");
            }
        }

        loadMovies();
    </script>
</body>
</html>
